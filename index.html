<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTER Crypto Live Pro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        :root {
            --bg-body: #0b0e11;
            --bg-card: #161a1e;
            --bg-input: #2b3139;
            --text-main: #eaecef;
            --text-muted: #848e9c;
            --primary: #fcd535;
            --success: #0ecb81;
            --danger: #f6465d;
            --border: #2f3336;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { background-color: var(--bg-body); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }

        .container { display: flex; gap: 10px; max-width: 1600px; width: 100%; height: 90vh; }

        .sidebar { width: 300px; background: var(--bg-card); padding: 20px; border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 15px; }

        .coin-info { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }

        .coin-logo { width: 35px; height: 35px; background: var(--primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #000; font-size: 16px; }

        .price-display h2 { font-size: 28px; color: var(--success); margin: 5px 0; font-weight: 600; }

        .label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

        .balance-card { background: var(--bg-input); padding: 12px; border-radius: 4px; }

        .balance-row { display: flex; justify-content: space-between; margin-top: 5px; font-size: 12px; }

        .status-badge { padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 600; }

        .up { color: var(--success); background: rgba(14, 203, 129, 0.15); }
        .down { color: var(--danger); background: rgba(246, 70, 93, 0.15); }

        .trade-options { display: flex; flex-direction: column; gap: 8px; margin-top: auto; }

        .trade-input-group { display: flex; background: var(--bg-input); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }

        .trade-input-group input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 14px; }

        .trade-input-group .unit { padding: 10px; color: var(--text-muted); font-size: 12px; border-left: 1px solid var(--border); }

        button { padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }

        .btn-buy { background: var(--success); color: white; }
        .btn-sell { background: var(--danger); color: white; }
        button:hover { opacity: 0.8; }

        .main-content { flex: 1; display: flex; flex-direction: column; gap: 10px; }

        .chart-box { flex: 1; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); position: relative; padding: 10px; overflow: hidden; }

        .history-box { height: 200px; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); padding: 15px; overflow-y: auto; }

        #chart { width: 100%; height: 100% !important; }

        .history-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .history-table th { text-align: left; color: var(--text-muted); padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .history-table td { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

        #notification { position: fixed; top: 20px; right: 20px; background: var(--bg-card); padding: 12px 20px; border-radius: 4px; border-left: 4px solid var(--primary); display: none; z-index: 1000; font-size: 13px; }
    </style>
</head>
<body>

<div id="notification">Trade alert!</div>

<div class="container">
    <div class="sidebar">
        <div class="coin-info">
            <div class="coin-logo">A</div>
            <div>
                <h4 style="margin:0">ASTER/USD</h4>
                <div id="price-trend" class="status-badge up">Live</div>
            </div>
        </div>

        <div class="price-display">
            <p class="label">Last Price</p>
            <h2 id="current-price">$2.5000</h2>
        </div>

        <div class="balance-card">
            <p class="label">Wallets</p>
            <div class="balance-row"><span>AST</span> <strong id="balance-amount">417.98</strong></div>
            <div class="balance-row"><span>Value</span> <strong id="total-value" style="color: var(--primary);">$0.00</strong></div>
        </div>

        <div class="trade-options">
            <p class="label">Place Order</p>
            <div class="trade-input-group">
                <input type="number" id="trade-amount" value="10">
                <span class="unit">AST</span>
            </div>
            <button class="btn-buy" onclick="executeTrade('BUY')">BUY / LONG</button>
            <button class="btn-sell" onclick="executeTrade('SELL')">SELL / SHORT</button>
        </div>
    </div>

    <div class="main-content">
        <div class="chart-box">
            <div id="chart"></div>
        </div>

        <div class="history-box">
            <p class="label" style="margin-bottom:10px;">Recent Market Activity</p>
            <table class="history-table">
                <thead><tr><th>Time</th><th>Type</th><th>Amount</th><th>Price</th><th>Total</th></tr></thead>
                <tbody id="history-log"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- Updated Price Range ---
    const MIN_PRICE = 2.094;
    const MAX_PRICE = 3.363;
    const CANDLE_DURATION = 60000; 

    let myAmount = 417.98; 
    let currentLivePrice = 2.7500; // Starting middle price
    let seriesData = [];
    let historyLog = [];
    let currentCandle = null;

    const chartOptions = {
        series: [{ data: [] }],
        chart: {
            type: 'candlestick',
            height: '100%',
            toolbar: { show: false },
            animations: { enabled: true, easing: 'linear', dynamicAnimation: { speed: 500 } },
            background: 'transparent',
            foreColor: '#848e9c'
        },
        xaxis: { 
            type: 'datetime',
            labels: { style: { fontSize: '10px' } },
            axisBorder: { show: false },
            axisTicks: { show: false }
        },
        yaxis: { 
            opposite: true,
            min: MIN_PRICE - 0.1, // Small buffer for visual comfort
            max: MAX_PRICE + 0.1,
            labels: { 
                formatter: (val) => val.toFixed(4),
                style: { fontSize: '10px' } 
            }
        },
        grid: {
            borderColor: '#23272c',
            strokeDashArray: 2,
            xaxis: { lines: { show: true } },
            yaxis: { lines: { show: true } }
        },
        plotOptions: {
            candlestick: {
                colors: { up: '#0ecb81', down: '#f6465d' },
                wick: { useFillColor: true }
            }
        },
        tooltip: { theme: 'dark' }
    };

    const chart = new ApexCharts(document.querySelector("#chart"), chartOptions);
    chart.render();

    function updateMarket() {
        const now = new Date().getTime();
        const candleTime = Math.floor(now / CANDLE_DURATION) * CANDLE_DURATION;

        // Slow movement logic
        let volatility = 0.008; 
        let change = (Math.random() - 0.5) * volatility;
        let newPrice = parseFloat((currentLivePrice + change).toFixed(4));

        // Boundary check
        if (newPrice > MAX_PRICE) newPrice = MAX_PRICE;
        if (newPrice < MIN_PRICE) newPrice = MIN_PRICE;

        if (!currentCandle || currentCandle.x !== candleTime) {
            currentCandle = {
                x: candleTime,
                y: [newPrice, newPrice, newPrice, newPrice]
            };
            seriesData.push(currentCandle);
            if (seriesData.length > 60) seriesData.shift(); 
        } else {
            let [open, high, low, close] = currentCandle.y;
            high = Math.max(high, newPrice);
            low = Math.min(low, newPrice);
            close = newPrice;
            currentCandle.y = [open, high, low, close];
        }

        currentLivePrice = newPrice;
        chart.updateSeries([{ data: [...seriesData] }], false);
        
        document.getElementById('current-price').innerText = `$${newPrice.toFixed(4)}`;
        document.getElementById('total-value').innerText = `$${(newPrice * myAmount).toFixed(2)}`;
        document.getElementById('current-price').style.color = newPrice >= currentCandle.y[0] ? '#0ecb81' : '#f6465d';
    }

    function executeTrade(type) {
        const amount = parseFloat(document.getElementById('trade-amount').value);
        if (isNaN(amount) || amount <= 0) return;

        if (type === 'BUY') myAmount += amount;
        else if (myAmount >= amount) myAmount -= amount;
        else { showNotification("Insufficient Balance", "#f6465d"); return; }

        document.getElementById('balance-amount').innerText = myAmount.toFixed(2);
        
        const log = {
            time: new Date().toLocaleTimeString(),
            type: type,
            amount: amount,
            price: currentLivePrice.toFixed(4),
            total: (amount * currentLivePrice).toFixed(2)
        };
        historyLog.unshift(log);
        if(historyLog.length > 10) historyLog.pop();
        
        updateHistory();
        showNotification(`${type} Order Filled`, type === 'BUY' ? '#0ecb81' : '#f6465d');
    }

    function updateHistory() {
        document.getElementById('history-log').innerHTML = historyLog.map(t => `
            <tr>
                <td>${t.time}</td>
                <td style="color:${t.type==='BUY'?'#0ecb81':'#f6465d'}"><b>${t.type}</b></td>
                <td>${t.amount}</td>
                <td>$${t.price}</td>
                <td>$${t.total}</td>
            </tr>
        `).join('');
    }

    function showNotification(msg, color) {
        const n = document.getElementById('notification');
        n.innerText = msg; n.style.borderLeftColor = color; n.style.display = 'block';
        setTimeout(() => n.style.display = 'none', 2000);
    }

    setInterval(updateMarket, 1000); 
    updateMarket();
</script>

</body>
</html>
