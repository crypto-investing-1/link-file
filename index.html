<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTER Crypto Live Pro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        :root {
            --bg-body: #131722;
            --bg-card: #1e222d;
            --bg-input: #2a2e39;
            --text-main: #d1d4dc;
            --text-muted: #787b86;
            --primary: #f0b90b;
            --success: #00c076;
            --danger: #ff4040;
            --border: #363c4e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Trebuchet MS', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-body); color: var(--text-main); min-height: 100vh; padding: 10px; display: block; }
        .container { display: flex; gap: 15px; max-width: 1400px; margin: 0 auto; flex-direction: column; }

        .sidebar { background: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 15px; }
        .coin-info { display: flex; align-items: center; gap: 12px; }
        .coin-logo { width: 40px; height: 40px; background: var(--primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; color: black; font-size: 18px; }
        .price-display h2 { font-size: 30px; color: var(--text-main); margin: 5px 0; font-weight: bold; font-variant-numeric: tabular-nums; }
        .label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .balance-card { background: var(--bg-input); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .balance-row { display: flex; justify-content: space-between; margin-top: 8px; font-size: 14px; }

        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .up { color: var(--success); background: rgba(0, 192, 118, 0.1); }
        .down { color: var(--danger); background: rgba(255, 64, 64, 0.1); }

        .trade-options { display: flex; flex-direction: column; gap: 10px; }
        .trade-input-group { display: flex; background: var(--bg-input); border-radius: 6px; border: 1px solid var(--border); overflow: hidden; }
        .trade-input-group input { flex: 1; background: transparent; border: none; color: var(--text-main); padding: 12px; outline: none; font-size: 16px; width: 100%; }
        .trade-input-group .unit { padding: 12px; color: var(--text-muted); font-size: 13px; background: rgba(255,255,255,0.05); }

        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; text-transform: uppercase; }
        .btn-buy { background: var(--success); color: white; }
        .btn-sell { background: var(--danger); color: white; }

        .main-content { display: flex; flex-direction: column; gap: 15px; }
        .chart-box, .history-box { background: var(--bg-card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .box-header { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        #chart { width: 100%; height: 350px !important; margin-left: -10px; }

        .history-table-container { overflow-x: auto; width: 100%; }
        .history-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 400px; }
        .history-table th, .history-table td { text-align: left; padding: 12px 8px; border-bottom: 1px solid var(--border); }

        #notification { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--bg-card); padding: 12px 20px; border-radius: 50px; border: 1px solid var(--primary); display: none; z-index: 1000; font-size: 13px; }

        @media (min-width: 992px) {
            .container { flex-direction: row; align-items: flex-start; }
            .sidebar { flex: 0 0 350px; position: sticky; top: 20px; }
            .main-content { flex: 1; }
            #chart { height: 450px !important; }
        }
    </style>
</head>
<body>

<div id="notification">Trade executed!</div>

<div class="container">
    <div class="sidebar">
        <div class="coin-info">
            <div class="coin-logo">A</div>
            <div>
                <h3 style="margin:0">ASTER <span style="color:var(--text-muted); font-size:13px;">(AST)</span></h3>
                <div id="price-trend" class="status-badge up">Live Market</div>
            </div>
        </div>

        <div class="price-display">
            <p class="label">Live Price (USD)</p>
            <h2 id="current-price">$5.0900</h2>
        </div>

        <div class="balance-card">
            <p class="label">Your Assets</p>
            <div class="balance-row"><span>Amount:</span> <strong id="balance-amount">417.98 AST</strong></div>
            <div class="balance-row"><span>Total Value:</span> <strong id="total-value" style="color: var(--primary);">$0.00</strong></div>
        </div>

        <div class="trade-options">
            <p class="label">Quick Trade</p>
            <div class="trade-input-group">
                <input type="number" id="trade-amount" inputmode="decimal" value="10">
                <span class="unit">AST</span>
            </div>
            <div class="btn-group">
                <button class="btn-buy" onclick="executeTrade('BUY')">BUY</button>
                <button class="btn-sell" onclick="executeTrade('SELL')">SELL</button>
            </div>
        </div>
        <button onclick="resetData()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:10px; margin-top:5px;">Reset All Data</button>
    </div>

    <div class="main-content">
        <div class="chart-box">
            <div class="box-header">
                <h3>ASTER / USD <span style="font-size:10px; color:var(--text-muted); font-weight: normal;">10s</span></h3>
                <span class="label" style="font-size:9px;">Live Fluctuations</span>
            </div>
            <div id="chart"></div>
        </div>

        <div class="history-box">
            <div class="box-header"><h3>Trade History</h3></div>
            <div class="history-table-container">
                <table class="history-table">
                    <thead><tr><th>Time</th><th>Type</th><th>Amt</th><th>Price</th><th>Total</th></tr></thead>
                    <tbody id="history-log"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const MIN_PRICE = 5.0900;
    const MAX_PRICE = 7.0900;
    const CANDLE_DURATION = 10000; 

    let myAmount = parseFloat(localStorage.getItem('ast_balance')) || 417.98;
    let currentLivePrice = parseFloat(localStorage.getItem('ast_last_price')) || 5.0900;
    let priceDirection = localStorage.getItem('ast_direction') || 'up'; 
    let seriesData = JSON.parse(localStorage.getItem('ast_series')) || [];
    let historyLog = JSON.parse(localStorage.getItem('ast_history')) || [];

    const successColor = '#00c076';
    const dangerColor = '#ff4040';

    const chart = new ApexCharts(document.querySelector("#chart"), {
        series: [{ data: seriesData }],
        chart: { type: 'candlestick', height: '100%', toolbar: { show: false }, animations: { enabled: false }, background: 'transparent' },
        xaxis: { type: 'datetime', labels: { style: { colors: '#787b86', fontSize: '10px' }, datetimeUTC: false }, axisBorder: { show: false } },
        yaxis: { opposite: true, min: MIN_PRICE - 0.1, max: MAX_PRICE + 0.1, labels: { formatter: (val) => val.toFixed(3), style: { colors: '#787b86', fontSize: '10px' } } },
        grid: { borderColor: '#363c4e', strokeDashArray: 4 },
        plotOptions: { candlestick: { colors: { up: successColor, down: dangerColor } } }
    });
    chart.render();

    function updateMarket() {
        const now = new Date().getTime();
        const candleTime = Math.floor(now / CANDLE_DURATION) * CANDLE_DURATION;

        // প্রাইস মুভমেন্ট লজিক: 0.0124 এর মতো র‍্যান্ডম সেন্ট সিস্টেম
        // 'up' ট্রেন্ডে বাড়ার সম্ভাবনা ৭০%, কমার সম্ভাবনা ৩০% (যাতে গ্রাফ উপরের দিকেই যায়)
        let movement = (Math.random() * 0.0150) + 0.0050; // র‍্যান্ডম 0.0050 থেকে 0.0200
        
        let isDip = Math.random() < 0.35; // ৩৫% সম্ভাবনা যে প্রাইস একটু কমবে (Fluctuation)

        if (priceDirection === 'up') {
            if (isDip) currentLivePrice -= (movement * 0.6); // সামান্য ডিপ
            else currentLivePrice += movement; // বড় জাম্প
            
            if (currentLivePrice >= MAX_PRICE) priceDirection = 'down';
        } else {
            // Down trend এও কিছুটা ফ্লাকচুয়েশন থাকবে
            if (isDip) currentLivePrice += (movement * 0.6);
            else currentLivePrice -= movement;
            
            if (currentLivePrice <= MIN_PRICE) priceDirection = 'up';
        }

        // ক্যান্ডেলস্টিক ডাটা ম্যানেজমেন্ট
        let lastCandle = seriesData[seriesData.length - 1];
        if (!lastCandle || lastCandle.x !== candleTime) {
            seriesData.push({ x: candleTime, y: [currentLivePrice, currentLivePrice, currentLivePrice, currentLivePrice] });
            if (seriesData.length > 40) seriesData.shift(); 
        } else {
            let y = lastCandle.y;
            y[1] = Math.max(y[1], currentLivePrice); // High
            y[2] = Math.min(y[2], currentLivePrice); // Low
            y[3] = currentLivePrice; // Close
        }

        localStorage.setItem('ast_last_price', currentLivePrice);
        localStorage.setItem('ast_direction', priceDirection);
        localStorage.setItem('ast_series', JSON.stringify(seriesData));

        chart.updateSeries([{ data: seriesData }], false);
        updateUI();
    }

    function updateUI() {
        document.getElementById('current-price').innerText = `$${currentLivePrice.toFixed(4)}`;
        document.getElementById('total-value').innerText = `$${(currentLivePrice * myAmount).toFixed(2)}`;
        document.getElementById('balance-amount').innerText = `${myAmount.toFixed(2)} AST`;

        const trendEl = document.getElementById('price-trend');
        trendEl.innerText = priceDirection === 'up' ? "▲ Bullish" : "▼ Bearish";
        trendEl.className = `status-badge ${priceDirection === 'up' ? 'up' : 'down'}`;
        document.getElementById('current-price').style.color = priceDirection === 'up' ? successColor : dangerColor;
    }

    function executeTrade(type) {
        const amount = parseFloat(document.getElementById('trade-amount').value);
        if (isNaN(amount) || amount <= 0) return;
        if (type === 'SELL' && amount > myAmount) { showNotification("⚠️ Insufficient balance!"); return; }

        myAmount = type === 'BUY' ? myAmount + amount : myAmount - amount;

        const trade = {
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
            type: type,
            amount: amount,
            price: currentLivePrice.toFixed(4),
            total: (amount * currentLivePrice).toFixed(2)
        };
        
        historyLog.unshift(trade);
        if(historyLog.length > 10) historyLog.pop();

        localStorage.setItem('ast_balance', myAmount);
        localStorage.setItem('ast_history', JSON.stringify(historyLog));

        updateHistoryTable();
        updateUI();
        showNotification(`✅ ${type} Order Successful`);
    }

    function updateHistoryTable() {
        document.getElementById('history-log').innerHTML = historyLog.map(t => `
            <tr>
                <td>${t.time}</td>
                <td style="color:${t.type==='BUY'?successColor:dangerColor}; font-weight:bold">${t.type}</td>
                <td>${t.amount}</td>
                <td>$${t.price}</td>
                <td>$${t.total}</td>
            </tr>
        `).join('');
    }

    function showNotification(msg) {
        const n = document.getElementById('notification');
        n.innerText = msg; n.style.display = 'block';
        setTimeout(() => n.style.display = 'none', 2000);
    }

    function resetData() {
        if(confirm("Reset everything?")) { localStorage.clear(); location.reload(); }
    }

    updateHistoryTable();
    updateUI();
    setInterval(updateMarket, 1000); // প্রতি সেকেন্ডে মুভমেন্ট
</script>

</body>
</html>
